name: Feature Request
description: Suggest an idea or enhancement for this project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see added and why.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: I would like the project to...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the observable behavior required for completion.
      placeholder: |
        - [ ] A caller can perform the new action
        - [ ] Invalid input has defined behavior
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Describe the tests or manual checks that should prove completion.
      placeholder: Unit, integration, or manual verification expectations.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Describe any alternative solutions or features you've considered.
      placeholder: I also considered...
    validations:
      required: false

  - type: dropdown
    id: subproject
    attributes:
      label: Subproject
      description: Which subproject does this feature belong to?
      options:
        - Project-wide
        - Existing subproject
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: spec-notes
    attributes:
      label: Implementation Notes / Spec Discussion
      description: Any technical notes, design thoughts, or spec-level discussion. Keep spec details in comments on this issue.
      placeholder: Design thoughts, technical considerations...
    validations:
      required: false

  - type: input
    id: related-issues
    attributes:
      label: Related Sub-Issues
      description: Link any related sub-issues tracking smaller pieces of this feature.
      placeholder: "#1, #2, #3"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, references, or examples here.
      placeholder: Links to similar features in other projects, documentation, etc.
    validations:
      required: false
